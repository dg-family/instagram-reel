  <div class="card">
    <h1>ig-reel-translate</h1>
    <p>這是 <strong>GitHub Pages</strong> 靜態入口。轉錄與串流由 <strong>Fly.io 上的 API</strong> 提供。</p>
    <p><a class="btn" href="./app.html">開啟翻譯工具</a></p>
