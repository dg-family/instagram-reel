# Repo: github.com/dg-family/ig-reel-translate — PR / push 驗證 Docker 能否成功建置。
name: Docker build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ig-reel-translate:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
