# 將 docs/ 發佈到 GitHub Pages（專案網址：https://dg-family.github.io/instagram-reel/）
# 首次使用：Repo → Settings → Pages → Build and deployment → Source 選「GitHub Actions」
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Pages (landing + app + Fly API base)
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}
        run: |
          set -e
          mkdir -p _site
          cp docs/.nojekyll _site/
          cp docs/index.html _site/index.html
          cp static/index.html _site/app.html
          python3 scripts/inject_api_base.py _site/app.html "$PUBLIC_API_URL"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
